# Railway config para servicio Web (Vite SPA + Express minimal)
#
# Service "Root Directory" en Railway debe ser: . (raiz del repo)
# Por la misma razon que api: pnpm workspace deps.
#
# Variables build-time importantes (Vite las inlinea al bundle):
#   - VITE_API_URL: URL completa de la API (ej. https://api-staging.up.railway.app)
#
# Watch patterns: cambios en api o shared-types NO disparan rebuild del web,
# excepto los tipos publicos (que igual son resueltos via @nexott-learn/shared-types).

[build]
builder = "RAILPACK"
buildCommand = "pnpm install --frozen-lockfile && pnpm turbo build --filter=@nexott-learn/web"
watchPatterns = [
  "apps/web/**",
  "packages/shared-types/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "turbo.json",
  "tsconfig.base.json",
]

[deploy]
startCommand = "cd apps/web && node server.js"
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Railway config para servicio API (NestJS)
#
# Service "Root Directory" en Railway debe ser: . (raiz del repo)
# Para que pnpm pueda resolver workspace deps (packages/shared-types).
#
# Watch patterns: Railway redeploya solo si cambia codigo de la API,
# shared-types o config raiz. Cambios en apps/web NO disparan rebuild de api.

[build]
builder = "RAILPACK"
buildCommand = "pnpm install --frozen-lockfile && pnpm turbo build --filter=@nexott-learn/api"
watchPatterns = [
  "apps/api/**",
  "packages/shared-types/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "turbo.json",
  "tsconfig.base.json",
]

[deploy]
startCommand = "cd apps/api && pnpm prisma migrate deploy && node dist/main.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
